<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wohnprojekt Bergstraße</title>
   <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>

<body>
<!-- zentraler Aufruf von header.html -->
<div id="header"></div>
  
  <script>
    fetch("header.html")
    .then(r => r.text())
    .then(t => {
      document.getElementById("header").innerHTML = t;
    
    const burger = document.querySelector('.burger');
    const nav = document.querySelector('.main-nav');
    
    if (burger && nav) {
       burger.addEventListener('click', () => {
       nav.classList.toggle('active');
      });
    }  
    });
  </script>

  <section class="banner">
    <img src="images/winklerchristopher-germany-5292909_1920.jpg" alt="Banner">
  </section>
  
<main class="hero">
  <h1>Gemeinsam wohnen. Solidarisch leben.</h1>
  <p>
    Wir entwickeln ein selbstorganisiertes Wohnprojekt für langfristiges,
    bezahlbares und gemeinschaftliches Wohnen.
  </p>
  <a class="button" href="termine.html">Infoabende ansehen</a>
</main>

<footer class="container">
  © 2026 Wohnprojekt Bergstraße
</footer>


</body>

</html>
